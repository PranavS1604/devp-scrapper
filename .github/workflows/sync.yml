name: Devpost Scrape
on:
  repository_dispatch:
    types: [manual_sync]
  schedule:
    - cron: '0 0 * * *' # Runs every night automatically
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install playwright supabase google-genai
          playwright install chromium
      - name: Run Scraper
        run: python sync.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}